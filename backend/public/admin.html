<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctar — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #5e4091;
      --primary-dark: #4a3275;
      --primary-light: #f5f0ff;
      --bg: #faf8ff;
      --border: #e8e4f0;
      --text: #1e1b26;
      --muted: #6b6b7b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* ---- Login gate ---- */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
      background: radial-gradient(circle at 20% 20%, rgba(94,64,145,0.12), transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(94,64,145,0.10), transparent 40%), var(--bg);
    }
    .login-card {
      background: #fff; border: 1px solid var(--border); border-radius: 22px;
      padding: 40px 34px; width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 20px 50px -20px rgba(94,64,145,0.3);
    }
    .login-logo {
      width: 56px; height: 56px; border-radius: 16px; background: var(--primary);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; margin: 0 auto 18px;
    }
    .login-card h1 { font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
    .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; }
    .login-card input {
      width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 0.95rem; outline: none; margin-bottom: 14px; transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: var(--primary); }
    .login-card button {
      width: 100%; padding: 13px; background: var(--primary); color: #fff; border: none;
      border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .login-card button:hover { background: var(--primary-dark); }
    .login-error { color: #dc2626; font-size: 0.85rem; margin-top: 12px; min-height: 18px; }

    /* ---- Dashboard ---- */
    .dashboard { display: none; }
    .topbar {
      background: var(--primary); color: #fff; padding: 16px 0;
      position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .topbar-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 22px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo {
      width: 38px; height: 38px; border-radius: 11px; background: rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center; font-weight: 800;
    }
    .brand h1 { font-size: 1.05rem; font-weight: 800; line-height: 1.1; }
    .brand span { font-size: 0.72rem; opacity: 0.8; }
    .logout-btn {
      background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.2); color: #fff;
      padding: 8px 16px; border-radius: 999px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.26); }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 22px 60px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
    .stat-card {
      background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    .stat-card .num { font-size: 1.7rem; font-weight: 800; color: var(--primary); line-height: 1; }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }

    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
    .section-head h2 { font-size: 1.2rem; font-weight: 800; }
    .refresh-btn {
      background: #fff; border: 1.5px solid var(--primary); color: var(--primary);
      padding: 8px 18px; border-radius: 999px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--primary); color: #fff; }

    /* Table */
    .table-card { background: #fff; border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--primary-light); }
    th {
      text-align: left; padding: 14px 16px; font-size: 0.74rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary);
    }
    td { padding: 14px 16px; font-size: 0.88rem; border-top: 1px solid #f1eef8; vertical-align: middle; }
    tbody tr:hover { background: #fbfaff; }
    .cell-name { font-weight: 700; }
    .cell-muted { color: var(--muted); }

    .badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 0.72rem; font-weight: 700; text-transform: capitalize; }
    .badge.pending { background: #fff4e5; color: #d97706; }
    .badge.confirmed { background: #e8f8ef; color: #16a34a; }
    .badge.cancelled { background: #fde8e8; color: #dc2626; }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .act-btn {
      border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.76rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
    }
    .act-confirm { background: #e8f8ef; color: #16a34a; }
    .act-confirm:hover { background: #16a34a; color: #fff; }
    .act-cancel { background: #fde8e8; color: #dc2626; }
    .act-cancel:hover { background: #dc2626; color: #fff; }
    .act-btn:disabled { opacity: 0.4; cursor: default; }

    .state { text-align: center; padding: 50px 20px; color: var(--muted); }

    /* Mobile */
    @media (max-width: 760px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; }
      tr { border-top: 1px solid var(--border); padding: 12px 4px; }
      tr:first-child { border-top: none; }
      td { border: none; padding: 6px 14px; display: flex; justify-content: space-between; gap: 14px; }
      td::before { content: attr(data-label); font-weight: 700; color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.04em; }
      td.actions-cell { justify-content: flex-start; }
      td.actions-cell::before { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN GATE -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">D</div>
      <h1>Doctar Admin</h1>
      <p>Enter the password to access the dashboard</p>
      <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
      <button id="loginBtn">Unlock Dashboard</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-logo">D</div>
          <div>
            <h1>Doctar Admin</h1>
            <span>Booking management</span>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Log out</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stats" id="stats"></div>

      <div class="section-head">
        <h2>All Bookings</h2>
        <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Phone</th><th>Disease</th><th>Status</th><th>Date</th><th>Source</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7"><div class="state">Loading bookings…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'doctar2024';
    const API = '/api/bookings';

    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');

    // ---- Auth (basic, client-side) ----
    function unlock() {
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      loadBookings();
    }
    function tryLogin() {
      const val = document.getElementById('pwInput').value;
      if (val === ADMIN_PASSWORD) {
        sessionStorage.setItem('doctarAdmin', '1');
        unlock();
      } else {
        document.getElementById('loginError').textContent = 'Incorrect password. Try again.';
      }
    }
    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('doctarAdmin');
      location.reload();
    });
    if (sessionStorage.getItem('doctarAdmin') === '1') unlock();

    // ---- Data ----
    document.getElementById('refreshBtn').addEventListener('click', loadBookings);

    function fmtDate(d) {
      return new Date(d).toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

    async function loadBookings() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '<tr><td colspan="7"><div class="state">Loading bookings…</div></td></tr>';
      try {
        const res = await fetch(API + '/all');
        const json = await res.json();
        const rows = json.data || [];
        renderStats(rows);
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="7"><div class="state">No bookings yet.</div></td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(b => `
          <tr>
            <td data-label="Name" class="cell-name">${esc(b.name)}</td>
            <td data-label="Phone">${esc(b.phone)}</td>
            <td data-label="Disease">${esc(b.disease)}</td>
            <td data-label="Status"><span class="badge ${esc(b.status)}">${esc(b.status)}</span></td>
            <td data-label="Date" class="cell-muted">${fmtDate(b.createdAt)}</td>
            <td data-label="Source" class="cell-muted">${esc(b.source)}</td>
            <td class="actions-cell">
              <div class="actions">
                <button class="act-btn act-confirm" ${b.status === 'confirmed' ? 'disabled' : ''} onclick="setStatus('${b._id}','confirmed')">Confirm</button>
                <button class="act-btn act-cancel" ${b.status === 'cancelled' ? 'disabled' : ''} onclick="setStatus('${b._id}','cancelled')">Cancel</button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="state">Failed to load. Is the server running?</div></td></tr>';
      }
    }

    function renderStats(rows) {
      const total = rows.length;
      const pending = rows.filter(r => r.status === 'pending').length;
      const confirmed = rows.filter(r => r.status === 'confirmed').length;
      const cancelled = rows.filter(r => r.status === 'cancelled').length;
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="num">${total}</div><div class="label">Total Bookings</div></div>
        <div class="stat-card"><div class="num">${pending}</div><div class="label">Pending</div></div>
        <div class="stat-card"><div class="num">${confirmed}</div><div class="label">Confirmed</div></div>
        <div class="stat-card"><div class="num">${cancelled}</div><div class="label">Cancelled</div></div>
      `;
    }

    async function setStatus(id, status) {
      try {
        const res = await fetch(`${API}/${id}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        const json = await res.json();
        if (json.success) loadBookings();
        else alert(json.message || 'Update failed');
      } catch (err) {
        alert('Update failed — is the server running?');
      }
    }
    window.setStatus = setStatus;
  </script>
</body>
</html>
